name: Build disk images
on:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Nombre de la receta (ej: recipe.yml)'
        default: 'recipe.yml'
        required: true
      arch:
        description: 'Arquitectura (amd64)'
        default: 'amd64'
        required: true

jobs:
  build-disk:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ github.event.inputs.recipe }}
          build_disk: true
          # ESTA ES LA LÍNEA QUE QUITA EL ERROR DE COSIGN
          extra_flags: --no-sign

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazzite-hyprland-iso
          path: ./output/*.iso
          if-no-files-found: error
