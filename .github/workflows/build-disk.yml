name: Build disk images
on:
  workflow_dispatch:
    inputs:
      recipe:
        description: 'recipe.yml'
        default: 'recipe.yml'
        required: true
      arch:
        description: 'amd64'
        default: 'amd64'
        required: true

jobs:
  build-disk:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ github.event.inputs.recipe }}
          build_disk: true
          # Usamos este formato que es más agresivo para forzar el salto de firma
          extra_flags: "--no-sign --pull=always"

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazzite-hyprland-iso
          path: ./output/*.iso
          if-no-files-found: error
